apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: green-app
  template:
    metadata:
      labels:
        app: green-app
    spec:
      containers:
      - name: green-app-container
        image: sehaj07/bluegreen-app:v2.1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
